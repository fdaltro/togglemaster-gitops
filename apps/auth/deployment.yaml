apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: togglemaster
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: 174935208848.dkr.ecr.us-east-1.amazonaws.com/togglemaster-auth:v1.0.0-94506e9
        ports:
        - containerPort: 8001

        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: auth-secret
              key: DATABASE_URL

        - name: MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: auth-secret
              key: MASTER_KEY

        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: auth-config
              key: PORT

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"

        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 20
          periodSeconds: 20
