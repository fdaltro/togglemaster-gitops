apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-db-init-sql
  namespace: togglemaster
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS api_keys (
        id SERIAL PRIMARY KEY,
        name VARCHAR(100) NOT NULL,
        key_hash VARCHAR(64) NOT NULL UNIQUE, 
        is_active BOOLEAN DEFAULT true,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );
---
apiVersion: batch/v1
kind: Job
metadata:
  name: auth-db-setup
  namespace: togglemaster
spec:
  template:
    spec:
      containers:
      - name: db-init
        image: postgres:15-alpine
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: auth-secret
              key: DATABASE_URL
        command: ["/bin/sh", "-c", "psql $DATABASE_URL -f /scripts/init.sql"]
        volumeMounts:
        - name: sql-volume
          mountPath: /scripts
      volumes:
      - name: sql-volume
        configMap:
          name: auth-db-init-sql
      restartPolicy: OnFailure