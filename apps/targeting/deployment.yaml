apiVersion: apps/v1
kind: Deployment
metadata:
  name: targeting-service
  namespace: togglemaster
spec:
  replicas: 2
  selector:
    matchLabels:
      app: targeting-service
  template:
    metadata:
      labels:
        app: targeting-service
    spec:
      containers:
      - name: targeting-service
        image: togglemaster-targeting
        imagePullPolicy: Always
        ports:
        - containerPort: 8003
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: targeting-db-secret
              key: DATABASE_URL
        - name: PORT
          value: "8003"
        # ADIÇÃO: Mapeamento da URL do serviço de autenticação
        - name: AUTH_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: targeting-service-config
              key: AUTH_SERVICE_URL
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"