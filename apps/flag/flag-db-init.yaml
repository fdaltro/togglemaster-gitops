apiVersion: v1
kind: ConfigMap
metadata:
  name: flag-db-init-sql
  namespace: togglemaster
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS flags (
        id SERIAL PRIMARY KEY,
        name VARCHAR(100) UNIQUE NOT NULL, 
        description TEXT,
        is_enabled BOOLEAN NOT NULL DEFAULT false,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );
    CREATE OR REPLACE FUNCTION trigger_set_timestamp()
    RETURNS TRIGGER AS $$
    BEGIN
      NEW.updated_at = NOW();
      RETURN NEW;
    END;
    $$ LANGUAGE plpgsql;
    DROP TRIGGER IF EXISTS set_timestamp ON flags;
    CREATE TRIGGER set_timestamp BEFORE UPDATE ON flags FOR EACH ROW EXECUTE PROCEDURE trigger_set_timestamp();
---
apiVersion: batch/v1
kind: Job
metadata:
  name: flag-db-setup
  namespace: togglemaster
spec:
  template:
    spec:
      containers:
      - name: db-init
        image: postgres:15-alpine
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: flag-service-secret
              key: DATABASE_URL
        command: ["/bin/sh", "-c", "psql $DATABASE_URL -f /scripts/init.sql"]
        volumeMounts:
        - name: sql-volume
          mountPath: /scripts
      volumes:
      - name: sql-volume
        configMap:
          name: flag-db-init-sql
      restartPolicy: OnFailure